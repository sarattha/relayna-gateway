<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relayna Gateway Admin</title>
    <script type="module" crossorigin src="/admin-ui/app.js"></script>
    <link rel="stylesheet" crossorigin href="/admin-ui/app.css">
  </head>
  <body>
    <div id="login" class="login-shell">
      <form id="login-form" class="login-panel">
        <div class="login-mark">Relayna</div>
        <h1>Gateway Admin</h1>
        <p class="login-copy">Operate AI traffic, policy, services, and usage from one governed control plane.</p>
        <label>
          Operator token
          <input id="operator-token" type="password" autocomplete="current-password" />
        </label>
        <button class="primary" type="submit">Sign in</button>
        <p id="login-error" class="error-text"></p>
      </form>
    </div>

    <main id="app" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-kicker">Relayna</span>
          <strong>Gateway Admin</strong>
        </div>
        <nav class="nav-groups" aria-label="Admin sections">
          <section class="nav-group">
            <span>Monitor</span>
            <button data-view="overview" class="nav active">Overview</button>
            <button data-view="health" class="nav">Health</button>
            <button data-view="usage" class="nav">Usage</button>
          </section>
          <section class="nav-group">
            <span>Discover</span>
            <button data-view="providers" class="nav">Providers</button>
            <button data-view="services" class="nav">Services</button>
            <button data-view="routes" class="nav">Routes</button>
            <button data-view="projects" class="nav">Projects</button>
          </section>
          <section class="nav-group">
            <span>Govern</span>
            <button data-view="keys" class="nav">Keys</button>
            <button data-view="guardrails" class="nav">Guardrails</button>
            <button data-view="audit" class="nav">Audit</button>
            <button data-view="settings" class="nav">Settings</button>
          </section>
        </nav>
        <div class="sidebar-actions">
          <button id="rotate-token" class="danger">Rotate token</button>
          <button id="sign-out">Sign out</button>
        </div>
      </aside>

      <section class="workspace">
        <header class="toolbar">
          <div>
            <span id="view-domain" class="eyebrow">Monitor</span>
            <h2 id="view-title">Overview</h2>
            <p id="view-summary" class="view-summary">Gateway posture, traffic, and service availability.</p>
          </div>
          <button id="refresh">Refresh</button>
        </header>
        <section id="content"></section>
      </section>
    </main>

    <template id="raw-token-template">
      <section class="modal-backdrop">
        <div class="modal">
          <h3>Token shown once</h3>
          <textarea readonly rows="4"></textarea>
          <button data-close-modal>Close</button>
        </div>
      </section>
    </template>

  </body>
</html>
