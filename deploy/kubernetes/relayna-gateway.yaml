apiVersion: v1
kind: ConfigMap
metadata:
  name: relayna-gateway-config
data:
  GATEWAY_BIND_ADDR: "0.0.0.0:8080"
  GATEWAY_CONTROL_BIND_ADDR: "0.0.0.0:8081"
  LOG_LEVEL: "gateway_api=info,gateway_proxy=info"
---
apiVersion: v1
kind: Secret
metadata:
  name: relayna-gateway-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgres://replace-me"
  REDIS_URL: "redis://replace-me"
  LITELLM_BASE_URL: "http://litellm:4000"
  LITELLM_SERVICE_KEY: "replace-me"
  # Optional first-start bootstrap token. Ignored after an active operator token exists.
  GATEWAY_ADMIN_TOKEN: ""
  DIRECT_OPENAI_BASE_URL: ""
  DIRECT_OPENAI_SERVICE_KEY: ""
  RELAYNA_WORKER_TOKEN: ""
  # Optional Studio fallback. Operators can override this connection in Admin Settings.
  RELAYNA_STUDIO_BASE_URL: ""
  RELAYNA_STUDIO_TOKEN: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relayna-gateway
  labels:
    app.kubernetes.io/name: relayna-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: relayna-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relayna-gateway
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/sarattha/relayna-gateway:0.1.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: proxy
              containerPort: 8080
            - name: control
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: relayna-gateway-config
            - secretRef:
                name: relayna-gateway-secrets
          readinessProbe:
            httpGet:
              path: /admin-ui/readyz
              port: control
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /admin-ui/healthz
              port: control
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: relayna-gateway-proxy
  labels:
    app.kubernetes.io/name: relayna-gateway
    relayna.io/service: proxy
spec:
  selector:
    app.kubernetes.io/name: relayna-gateway
  ports:
    - name: proxy
      port: 80
      targetPort: proxy
---
apiVersion: v1
kind: Service
metadata:
  name: relayna-gateway-control
  labels:
    app.kubernetes.io/name: relayna-gateway
    relayna.io/service: control
spec:
  selector:
    app.kubernetes.io/name: relayna-gateway
  ports:
    - name: control
      port: 8081
      targetPort: control
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: relayna-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: relayna-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: relayna-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: relayna-gateway
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: relayna-gateway
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: relayna-gateway
      relayna.io/service: control
  endpoints:
    - port: control
      path: /admin-ui/metrics
      interval: 30s
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: relayna-gateway
spec:
  ingressClassName: nginx
  rules:
    - host: gateway.relayna.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: relayna-gateway-proxy
                port:
                  name: proxy
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: relayna-gateway-control
  annotations:
    # Example only: bind this ingress to an internal/VPN/IAP-protected class.
    nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8"
spec:
  ingressClassName: nginx-internal
  rules:
    - host: gateway-admin.relayna.local
      http:
        paths:
          - path: /admin-ui
            pathType: Prefix
            backend:
              service:
                name: relayna-gateway-control
                port:
                  name: control
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: relayna-gateway
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: relayna-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              relayna.io/control-plane-access: "true"
      ports:
        - protocol: TCP
          port: 8081
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: litellm
      ports:
        - protocol: TCP
          port: 4000
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: relayna-studio-backend
      ports:
        - protocol: TCP
          port: 8000
    - to:
        # Replace this placeholder with approved provider egress CIDRs or a
        # cluster egress gateway selector before production use.
        - ipBlock:
            cidr: 203.0.113.0/24
      ports:
        - protocol: TCP
          port: 443
