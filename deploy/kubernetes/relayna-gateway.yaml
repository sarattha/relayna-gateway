apiVersion: v1
kind: ConfigMap
metadata:
  name: relayna-gateway-config
data:
  GATEWAY_BIND_ADDR: "0.0.0.0:8080"
  GATEWAY_CONTROL_BIND_ADDR: "0.0.0.0:8081"
  LOG_LEVEL: "gateway_api=info,gateway_proxy=info"
---
apiVersion: v1
kind: Secret
metadata:
  name: relayna-gateway-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgres://replace-me"
  REDIS_URL: "redis://replace-me"
  LITELLM_BASE_URL: "http://litellm:4000"
  LITELLM_SERVICE_KEY: "replace-me"
  DIRECT_OPENAI_BASE_URL: ""
  DIRECT_OPENAI_SERVICE_KEY: ""
  RELAYNA_WORKER_TOKEN: ""
  # Optional Studio fallback. Operators can override this connection in Admin Settings.
  RELAYNA_STUDIO_BASE_URL: ""
  RELAYNA_STUDIO_TOKEN: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relayna-gateway
  labels:
    app.kubernetes.io/name: relayna-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: relayna-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relayna-gateway
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
      containers:
        - name: gateway
          image: ghcr.io/sarattha/relayna-gateway:0.0.9
          imagePullPolicy: IfNotPresent
          ports:
            - name: proxy
              containerPort: 8080
            - name: control
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: relayna-gateway-config
            - secretRef:
                name: relayna-gateway-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: control
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: control
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: relayna-gateway
spec:
  selector:
    app.kubernetes.io/name: relayna-gateway
  ports:
    - name: proxy
      port: 80
      targetPort: proxy
    - name: control
      port: 8081
      targetPort: control
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: relayna-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: relayna-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: relayna-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: relayna-gateway
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: relayna-gateway
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: relayna-gateway
  endpoints:
    - port: control
      path: /metrics
      interval: 30s
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: relayna-gateway
spec:
  ingressClassName: nginx
  rules:
    - host: gateway.relayna.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: relayna-gateway
                port:
                  name: proxy
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: relayna-gateway
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: relayna-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - {}
