name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release metadata
        run: python3 scripts/validate-release-metadata.py "${{ github.ref_name }}"

      - name: Determine latest stable image tag eligibility
        id: latest_tag
        run: |
          git fetch --force --tags

          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            latest_stable_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"
            if [ "${latest_stable_tag}" = "${GITHUB_REF_NAME}" ]; then
              echo "enabled=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Detect Cargo workspace
        id: cargo
        run: |
          if [ -f Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Rust
        if: steps.cargo.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build output
        if: steps.cargo.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Run release checks
        if: steps.cargo.outputs.present == 'true'
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-features
          cargo build --workspace --release --all-features

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run admin portal tests
        run: |
          node tests/admin-ui.test.mjs
          node tests/freeze-v0.1.0-perimeter.test.mjs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build documentation
        run: |
          pip install mkdocs-material
          mkdocs build --strict

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ steps.latest_tag.outputs.enabled == 'true' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: false

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" \
            --output spdx-json=relayna-gateway-${{ github.ref_name }}.spdx.json

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_YES: "true"
        run: cosign sign "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Extract release notes
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import subprocess

          version = os.environ["RELEASE_VERSION"].lstrip("v")
          changelog = pathlib.Path("CHANGELOG.md")

          if changelog.exists():
              lines = changelog.read_text().splitlines()
              target = f"## {version} -"
              capture = False
              body = []

              for line in lines:
                  if line.startswith("## "):
                      if capture:
                          break
                      capture = line.startswith(target)
                      continue
                  if capture:
                      body.append(line)

              text = "\n".join(body).strip()
          else:
              text = ""

          if not text:
              raise SystemExit(f"missing CHANGELOG.md notes for {version}")

          pathlib.Path("release-notes.md").write_text(text + "\n")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            CHANGELOG.md
            relayna-gateway-${{ github.ref_name }}.spdx.json
