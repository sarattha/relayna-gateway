name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect Cargo workspace
        id: cargo
        run: |
          if [ -f Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Rust
        if: steps.cargo.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry and build output
        if: steps.cargo.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        if: steps.cargo.outputs.present == 'true'
        run: cargo fmt --all --check

      - name: Run Clippy
        if: steps.cargo.outputs.present == 'true'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        if: steps.cargo.outputs.present == 'true'
        run: cargo test --workspace --all-features

      - name: Build workspace
        if: steps.cargo.outputs.present == 'true'
        run: cargo build --workspace --all-features

      - name: Skip Rust checks
        if: steps.cargo.outputs.present != 'true'
        run: echo "No Cargo.toml found yet; skipping Rust workspace checks."

  security:
    name: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build output
        uses: Swatinem/rust-cache@v2

      - name: Install Rust security tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
          cargo install cargo-machete --locked

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Audit Rust advisories
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2024-0437

      - name: Check dependency policy
        run: cargo deny check

      - name: Check unused Rust dependencies
        run: cargo machete

      - name: Run nextest
        run: cargo nextest run --workspace --all-features

      - name: Scan repository filesystem with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Detect committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: .semgrep.yml

  admin-portal:
    name: admin portal
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run admin portal tests
        run: node tests/admin-ui.test.mjs

  repository-metadata:
    name: repository metadata
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required guidance files
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f PLANS.md
          test -f CHANGELOG.md
          test -f Dockerfile
          test -f internal/design-manifesto.md

      - name: Validate JSON schemas
        run: |
          python3 -m json.tool .github/codex/schemas/pr-labels.json >/dev/null

      - name: Validate workflow YAML parses
        run: |
          ruby -ryaml -e 'Dir[".github/workflows/*.yml"].each { |path| YAML.load_file(path) }'

      - name: Validate release metadata
        run: python3 scripts/validate-release-metadata.py

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install docs dependencies
        run: pip install mkdocs-material

      - name: Build documentation
        run: mkdocs build --strict
