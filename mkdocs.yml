site_name: Relayna Gateway
site_description: Public documentation for Relayna Gateway
site_url: https://sarattha.github.io/relayna-gateway/
repo_url: https://github.com/sarattha/relayna-gateway
repo_name: sarattha/relayna-gateway
theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    scheme: default
    primary: white
    accent: teal
  font:
    text: Manrope
    code: JetBrains Mono
nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Database: database.md
  - Redis Keys: redis.md
  - Getting Started: getting-started.md
  - Admin Portal: admin-portal.md
  - Current Feature Highlights: current-features.md
  - Guardrails: guardrails.md
  - Provider Intelligence: provider-intelligence.md
  - Deployment: deployment.md
  - Operations: operations.md
  - Security Exceptions: security-exceptions.md
  - Releases: releases.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - assets/mermaid-init.js
extra_css:
  - assets/stylesheets/extra.css
