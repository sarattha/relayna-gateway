site_name: relayna
site_description: Public documentation for relayna
site_url: https://sarattha.github.io/relayna/
repo_url: https://github.com/sarattha/relayna
repo_name: sarattha/relayna
theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    scheme: default
    primary: white
    accent: teal
  font:
    text: Manrope
    code: JetBrains Mono
nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Studio Backend: studio-backend.md
  - Studio Frontend: studio-frontend.md
  - Migration v1 to v2: migration-v1-to-v2.md
  - Components: components.md
  - Observability: observability.md
  - AKS Observability: aks-observability.md
  - Execution Graphs: execution-graphs.md
  - Workflow Topology: workflow-topology-plan.md
  - Releases: releases.md
  - Development: development.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - assets/mermaid-init.js
extra_css:
  - assets/stylesheets/extra.css
